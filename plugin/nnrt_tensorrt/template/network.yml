# Neural network configuration

input_names:                 # [Optional] List[String], rename model inputs by index
                             #   Required to have the same length as model inputs
  - observation              # Input 0 name
  - memory_in.0              # Input 1 name (example recurrent input)
  - memory_in.1              # Input 2 name (example recurrent input)

output_names:                # [Optional] List[String], rename model outputs by index
                             #   Required to have the same length as model outputs
  - action                   # Output 0 name
  - memory_out.0             # Output 1 name (example recurrent output)
  - memory_out.1             # Output 2 name (example recurrent output)

recurrent_params:            # [Optional] List[Tuple[String, String]], override recurrent (input -> output) mapping
                             #   If this key is missing, StepIt will try to infer recurrent pairs using (memory_in* -> memory_out*)
  - [ memory_in.0, memory_out.0 ]
  - [ memory_in.1, memory_out.1 ]

tensorrt_options:            # [Optional] Dict, TensorRT build / load options
  precision: fp32            # [Optional] Literal["fp16", "fp32"], TensorRT precision mode
                             #   On TensorRT 10.12+, 'fp16' relies on FP16 types already present in the ONNX model
                             #   or on a prebuilt engine because BuilderFlag::kFP16 is deprecated
  device_id: 0               # [Optional] Int, CUDA device index used before build / load
  engine_path: model.engine  # [Optional] String, serialized TensorRT engine path
                             #   Defaults to model_path with the .engine extension
                             #   Use different paths to cache different precisions / variants
  force_rebuild: false       # [Optional] Bool, rebuild engine even if engine_path already exists

# Notes:
# - StepIt's built-in Onnx-TensorRT converter only supports basic features. For specific model tuning,
#   please manually build the engine with `trtexec` and point engine_path to that result.
